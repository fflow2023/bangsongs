<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BangSongs Archive</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fbbf24'%3E%3Cpath d='M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'/%3E%3C/svg%3E"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.cn/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- Hero -->
    <div class="relative w-full h-64 md:h-80 overflow-hidden group">
      <img
        id="heroImage"
        alt="BanG Dream! Hero Background"
        class="absolute inset-0 w-full h-full object-cover opacity-20"
      />

      <!-- GitHub (floating) -->
      <a
        href="https://github.com/fflow2023/bangsongs"
        target="_blank"
        rel="noreferrer"
        title="打开 GitHub 仓库"
        class="absolute top-4 right-4 z-30 flex items-center justify-center w-12 h-12 rounded-full bg-slate-900/70 border border-slate-600 backdrop-blur hover:border-slate-400 hover:bg-slate-800/70 transition shadow-lg"
      >
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="w-6 h-6 fill-slate-200"
        >
          <path
            d="M12 .5C5.73.5.5 5.74.5 12.02c0 5.1 3.29 9.42 7.86 10.95.58.11.79-.25.79-.56v-2.02c-3.2.7-3.88-1.55-3.88-1.55-.53-1.35-1.29-1.71-1.29-1.71-1.06-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.11-.76.41-1.27.74-1.56-2.56-.29-5.26-1.28-5.26-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.8 0c2.2-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.4-5.28 5.69.42.36.79 1.07.79 2.16v3.2c0 .31.21.68.8.56A11.53 11.53 0 0 0 23.5 12C23.5 5.74 18.27.5 12 .5z"
          />
        </svg>
      </a>

      <div
        class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center z-10 pointer-events-none"
      >
        <h1
          class="text-4xl md:text-6xl font-bold mb-2 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 drop-shadow-lg"
        >
          BanG Dream! 动画系列歌曲整理
        </h1>
        <p class="text-slate-300 text-lg md:text-xl max-w-2xl">
          快速检索 · 一键分享
        </p>
      </div>
    </div>

    <!-- Main -->
    <div class="flex-grow container mx-auto px-4 py-8 relative z-20 -mt-10">
      <!-- Controls -->
      <div class="glass-panel rounded-2xl p-6 mb-8 shadow-xl">
        <!-- Search & Share -->
        <div
          class="flex flex-col md:flex-row gap-4 mb-6 justify-between items-center"
        >
          <div class="relative w-full md:w-1/2">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"
              >search</span
            >
            <input
              id="searchInput"
              type="text"
              placeholder="搜索歌名、翻译、或乐队..."
              class="w-full bg-slate-800 border border-slate-600 rounded-full py-3 pl-10 pr-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
            />
          </div>

          <div class="flex gap-3 w-full md:w-auto">
            <button
              id="favFilterBtn"
              class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-5 py-3 rounded-full transition border border-slate-500"
            >
              <span class="material-symbols-outlined text-red-400"
                >favorite</span
              >
              <span id="favBtnText">只看收藏</span>
            </button>

            <button
              id="shareBtn"
              class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white px-6 py-3 rounded-full shadow-lg transition transform hover:scale-105"
            >
              <span class="material-symbols-outlined">share</span>
              <span>分享喜爱</span>
            </button>
          </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-col gap-4">
          <div class="overflow-x-auto pb-2">
            <div id="seasonFilters" class="flex gap-2 min-w-max"></div>
          </div>

          <div class="overflow-x-auto pb-2">
            <div id="bandFilters" class="flex gap-2 min-w-max"></div>
          </div>
        </div>
      </div>

      <!-- Grid -->
      <div
        id="songGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></div>

      <!-- Empty -->
      <div id="emptyState" class="hidden text-center py-20">
        <span class="material-symbols-outlined text-6xl text-slate-600 mb-4"
          >music_off</span
        >
        <p class="text-xl text-slate-400">没有找到匹配的歌曲</p>
        <button id="resetFiltersBtn" class="mt-4 text-pink-400 hover:underline">
          重置筛选
        </button>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none z-50"
    >
      <span class="material-symbols-outlined text-green-400">check_circle</span>
      <span id="toastMsg">操作成功</span>
    </div>

    <!-- 外部脚本：数据在前，逻辑在后 -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
